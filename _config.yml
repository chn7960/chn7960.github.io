# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Haneul Choi"
title_separator          : "|"
name                     : &name "Haneul Choi"
description              : &description "Personal academic website of Haneul Choi, Ph.D. — Senior Researcher at Korea Institute of Energy Research (KIER)."
url                      : https://chn7960.github.io
baseurl                  : ""
repository               : "chn7960/chn7960.github.io"

# Site Author
author:
  avatar           : "bio-photo.jpg"
  name             : "Haneul Choi"
  pronouns         :
  bio              : "Senior Researcher, KIER"
  location         : "Daejeon, Republic of Korea"
  employer         : "Korea Institute of Energy Research"
  uri              :
  email            : "chn7960@kier.re.kr"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=8Kh7PeIAAAAJ&hl=en"
  inspire-hep      :
  impactstory      :
  orcid            : "https://orcid.org/0000-0003-2519-6348"
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     : "https://www.researchgate.net/profile/Haneul-Choi-2"
  scopus           :
  zotero           :

  # Repositories
  github           : "chn7960"

# Publication Categories
publication_category:
  manuscripts:
    title: 'Journal Articles (Selected)'
  conferences:
    title: 'Conference Papers'
  domestic:
    title: 'Domestic Journals & Conferences'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
atom_feed:
  hide                   : false
  path                   :

# SEO Related
google_site_verification :

# Social Sharing
og_image                 :
og_description           :
social:
  type                   : Person
  name                   : "Haneul Choi"
  links:
    - "https://orcid.org/0000-0003-2519-6348"
    - "https://scholar.google.com/citations?user=8Kh7PeIAAAAJ&hl=en"
    - "https://www.researchgate.net/profile/Haneul-Choi-2"
    - "https://github.com/chn7960"

# Analytics
analytics:
  provider               : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - docker-compose.yaml
  - _config_docker.yml
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - markdown_generator
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Seoul

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
  - jekyll-polyglot

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
  - jekyll-polyglot

# Polyglot (multilingual)
languages: ["en", "ko"]
default_lang: "en"
exclude_from_localization: ["images", "files", "assets", "markdown_generator", "scripts"]
parallel_localization: true

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
